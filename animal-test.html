<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인공지능 동물상 테스트</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header-nav">
        <button id="theme-toggle" class="theme-toggle">다크 모드</button>
        <nav class="navbar">
            <a href="index.html">로또 추첨기</a>
            <a href="animal-test.html" class="active">동물상 테스트</a>
        </nav>
    </header>

    <div class="container">
        <h1>인공지능 동물상 테스트</h1>
        
        <div class="animal-test-section">
            <div class="upload-container">
                <input type="file" id="image-upload" accept="image/*" class="file-input">
                <label for="image-upload" class="upload-label">
                    <span class="upload-icon">📸</span>
                    <p>사진을 선택하거나 업로드하세요</p>
                </label>
            </div>
            <div id="image-preview-container" class="preview-container" style="display: none;">
                <img id="face-image" src="#" alt="your image" />
            </div>
            <div id="label-container" class="label-container"></div>
            <p class="info-text">사진을 업로드하면 인공지능이 분석을 시작합니다.</p>
        </div>

        <div class="contact-section">
            <hr>
            <h3>제휴 문의</h3>
            <form action="https://formspree.io/f/mwvanban" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="name">성함/업체명</label>
                    <input type="text" id="name" name="name" required placeholder="예: 홍길동 / (주)파트너">
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" required placeholder="제휴 제안 내용을 적어주세요."></textarea>
                </div>
                <button type="submit" class="submit-button">문의하기</button>
            </form>
        </div>

        <div class="comments-section">
            <hr>
            <h3>댓글</h3>
            <div id="disqus_thread"></div>
            <script>
                (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://productbuilder-mvi300qkwi.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </div>

    <!-- AI Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="animal-test.js"></script>
    <script src="common.js"></script>
</body>
</html>
